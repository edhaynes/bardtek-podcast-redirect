<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ed's 100 Rules — Podcast | Bard Technical Solutions</title>
  <meta name="description" content="Ed's 100 Rules podcast — a walk through 100 Rules for Writing My Software, one episode at a time. Published by Bard Technical Solutions LLC.">
  <meta name="theme-color" content="#0b1220">
  <link rel="canonical" href="https://podcast.bardtek.com/">
  <link rel="icon" href="assets/owl.png" type="image/png">

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Ed's 100 Rules — Podcast">
  <meta property="og:description" content="A walk through 100 Rules for Writing My Software, one episode at a time.">
  <meta property="og:url" content="https://podcast.bardtek.com/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy-0:#0a1020; --navy-1:#0b1220; --navy-2:#122046; --navy-3:#1a2c5a;
      --gold:#e7c878; --gold-deep:#d4af6a; --ink:#eef1f8; --muted:#aab3c8;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--ink);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      background:radial-gradient(1200px 700px at 50% -10%,var(--navy-3) 0%,var(--navy-1) 45%,var(--navy-0) 100%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:2.5rem 1.25rem;
    }
    .card { width:100%; max-width:560px; }
    .owl { width:104px; height:auto; margin:0 auto 1.25rem; display:block;
           filter:drop-shadow(0 6px 20px rgba(0,0,0,.45)); }
    .eyebrow { font-size:.8rem; letter-spacing:.18em; text-transform:uppercase;
               color:var(--gold); margin:0 0 .5rem; font-weight:600; }
    h1 { font-family:'Sora',sans-serif; font-weight:800; font-size:2.25rem;
         line-height:1.1; margin:0 0 .65rem; }
    h1 .accent { color:var(--gold); }
    .tagline { color:var(--muted); font-size:1.05rem; line-height:1.5;
               margin:0 auto 2rem; max-width:42ch; }
    .actions { display:flex; flex-direction:column; gap:.85rem; align-items:stretch;
               max-width:340px; margin:0 auto; }
    .btn { display:flex; align-items:center; justify-content:center; gap:.6rem;
           padding:.95rem 1.4rem; border-radius:12px; font-weight:600; font-size:1.02rem;
           text-decoration:none; transition:transform .12s ease, box-shadow .12s ease; }
    .btn:hover { transform:translateY(-2px); }
    .btn--primary { background:linear-gradient(180deg,var(--gold),var(--gold-deep));
                    color:#1a1300; box-shadow:0 8px 22px rgba(231,200,120,.28); }
    .btn--ghost { background:rgba(255,255,255,.04); color:var(--ink);
                  border:1px solid rgba(170,179,200,.28); }
    .btn--ghost:hover { border-color:var(--gold); color:var(--gold); }
    .btn svg { width:20px; height:20px; flex:0 0 auto; }
    footer { margin-top:2.5rem; color:var(--muted); font-size:.85rem; line-height:1.6; }
    footer a { color:var(--muted); text-decoration:none; border-bottom:1px solid rgba(170,179,200,.3); }
    footer a:hover { color:var(--gold); border-color:var(--gold); }
    @media (max-width:420px) { h1 { font-size:1.9rem; } }
  </style>
</head>
<body>
  <main class="card">
    <img class="owl" src="assets/owl.png" alt="Bard Technical Solutions owl emblem">
    <p class="eyebrow">Bard Technical Solutions</p>
    <h1>Ed's <span class="accent">100 Rules</span><br>Podcast</h1>
    <p class="tagline">A walk through <em>100 Rules for Writing My Software</em> — one episode at a time. Watch and listen below.</p>

    <div class="actions">
      <!-- Channel-ID URL is stable even if the @handle changes. To re-point the
           podcast, edit this one href (and the Spotify href when added). -->
      <a class="btn btn--primary" href="https://www.youtube.com/channel/UCwCyx0-goMeBGd4H1t8J9fg" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
        Watch on YouTube
      </a>

      <!-- SPOTIFY: when the show is live on Spotify, uncomment and set the href:
      <a class="btn btn--ghost" href="https://open.spotify.com/show/XXXXXXXX" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0a12 12 0 1 0 0 24 12 12 0 0 0 0-24zm5.5 17.3a.75.75 0 0 1-1 .25c-2.8-1.7-6.3-2.1-10.5-1.1a.75.75 0 1 1-.33-1.46c4.6-1 8.5-.6 11.6 1.3.35.22.46.7.25 1.02zm1.47-3.27a.94.94 0 0 1-1.29.31c-3.2-2-8.1-2.54-11.9-1.4a.94.94 0 1 1-.54-1.8c4.3-1.3 9.7-.69 13.4 1.6.44.27.58.86.32 1.29zm.13-3.4C15.36 8.3 8.9 8.07 5.2 9.2a1.12 1.12 0 1 1-.65-2.15c4.25-1.29 11.4-1.04 15.9 1.62a1.12 1.12 0 0 1-1.15 1.92z"/></svg>
        Listen on Spotify
      </a>
      -->

      <a class="btn btn--ghost" href="https://github.com/edhaynes/eds-rules" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5a11.5 11.5 0 0 0-3.64 22.42c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.79 2.73 1.27 3.4.97.1-.76.41-1.27.74-1.56-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.43-2.69 5.41-5.25 5.69.42.36.8 1.08.8 2.18v3.24c0 .31.21.67.8.56A11.5 11.5 0 0 0 12 .5z"/></svg>
        Read the rules on GitHub
      </a>
    </div>

    <footer>
      Published by <a href="https://bardtek.com/" rel="noopener">Bard Technical Solutions LLC</a><br>
      &copy; Bard Technical Solutions LLC
    </footer>
  </main>
</body>
</html>
